server:
  port: 8081

spring:
  application:
    name: lab01-helloworld

  ai:
    openai:
      # API Key 从环境变量读取，避免硬编码敏感信息
      api-key: sk-ujazehkcoszvavvdpdyjhvnfezdbopkkopiklpvwyjzohlka
      # API 基础地址，支持自定义代理
      base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          # 模型名称
          model: ${OPENAI_MODEL:Qwen/Qwen3-8B}
          # 温度参数：控制输出随机性，0-2，值越小越确定
          temperature: 0.7
          # 最大输出 token 数
          max-tokens: 1024

# 日志配置
logging:
  level:
    root: INFO
    com.gyreq: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
