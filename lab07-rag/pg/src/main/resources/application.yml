server:
  port: 8088

spring:
  application:
    name: lab07-rag-pg

  datasource:
    url: jdbc:postgresql://localhost:5432/vector_db
    username: postgres
    password: postgres

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          model: ${OPENAI_MODEL:Qwen/Qwen3-8B}
          temperature: 0.7
          max-tokens: 1024

    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536

logging:
  level:
    com.gyreq: DEBUG
    org.springframework.ai: DEBUG
